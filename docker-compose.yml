version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ecommerce_pt30
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 555511
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: nest_api
    depends_on:
      - db
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: 555511
      DB_NAME: ecommerce_pt30
    volumes:
      - .:/app
    command: npm run start:prod

volumes:
  postgres_data: